<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prana — Breathing Practice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400&display=swap');

:root {
  --deep:    #0a1628;
  --ocean1:  #0d2137;
  --ocean2:  #0e3354;
  --wave1:   #1a5276;
  --wave2:   #1f618d;
  --foam:    #85c1e9;
  --pearl:   #d6eaf8;
  --gold:    #7eb8d4;
  --goldlt:  #b8ddf0;
  --white:   #f0f4f8;
  --text:    rgba(214,234,248,0.9);
  --textdim: rgba(133,193,233,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Karla', sans-serif;
  background: var(--deep);
  color: var(--text);
}

/* ── Ocean background ────────────────────────────────────────── */
#ocean-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 110%, #0e3354 0%, #0a1628 55%, #040d1a 100%);
  overflow: hidden;
}

.stars {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 6%,  rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 14%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 5%  22%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 28%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 5%,  rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 92% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 35%, rgba(255,255,255,0.3) 0%, transparent 100%);
  animation: twinkle 8s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0%   { opacity: 0.6; }
  100% { opacity: 1; }
}

/* Wave layers */
.wave-layer {
  position: absolute;
  bottom: 0; left: -10%; width: 120%;
  border-radius: 50% 50% 0 0 / 30px 30px 0 0;
}
.wl1 {
  height: 32%;
  background: linear-gradient(180deg, rgba(13,33,55,0) 0%, rgba(14,51,84,0.55) 40%, rgba(10,26,40,0.9) 100%);
  animation: wave1 9s ease-in-out infinite alternate;
}
.wl2 {
  height: 22%;
  background: linear-gradient(180deg, transparent 0%, rgba(26,82,118,0.35) 50%, rgba(10,22,36,0.7) 100%);
  animation: wave2 7s ease-in-out infinite alternate-reverse;
}
.wl3 {
  height: 12%;
  background: linear-gradient(180deg, transparent 0%, rgba(31,97,141,0.25) 60%, rgba(10,20,32,0.6) 100%);
  animation: wave3 5s ease-in-out infinite alternate;
}
@keyframes wave1 { 0% { transform: translateX(0) scaleY(1); } 100% { transform: translateX(-4%) scaleY(1.06); } }
@keyframes wave2 { 0% { transform: translateX(2%) scaleY(1); } 100% { transform: translateX(-2%) scaleY(1.1); } }
@keyframes wave3 { 0% { transform: translateX(-1%) scaleY(1); } 100% { transform: translateX(3%) scaleY(1.15); } }

/* Foam line */
.foam-line {
  position: absolute;
  bottom: 31%; left: -10%; width: 120%;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%, rgba(133,193,233,0.15) 20%,
    rgba(133,193,233,0.35) 50%,
    rgba(133,193,233,0.15) 80%, transparent 100%);
  animation: foam 9s ease-in-out infinite alternate;
}
@keyframes foam { 0% { transform: translateX(0); opacity: 0.6; } 100% { transform: translateX(-4%); opacity: 1; } }

/* ── Layout ──────────────────────────────────────────────────── */
#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 24px 20px 28px;
  gap: 0;
}

/* Header */
.header {
  text-align: center;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(28px, 5vw, 40px);
  letter-spacing: 3px;
  color: var(--pearl);
  line-height: 1;
  text-shadow: 0 0 40px rgba(133,193,233,0.3);
}
.header p {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--textdim);
  margin-top: 5px;
}

/* Technique selector */
.techniques {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  flex-shrink: 0;
}
.tech-btn {
  background: transparent;
  border: 1px solid rgba(133,193,233,0.2);
  border-radius: 999px;
  padding: 6px 16px;
  color: var(--textdim);
  font-family: 'Karla', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
}
.tech-btn:hover { border-color: rgba(133,193,233,0.5); color: var(--pearl); }
.tech-btn.active {
  background: rgba(133,193,233,0.12);
  border-color: var(--foam);
  color: var(--pearl);
}

/* Centre stage — ball + phase label */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  width: 100%;
  min-height: 0;
}

/* Outer glow ring */
.glow-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(133,193,233,0.12);
  transition: all 0.1s linear;
  pointer-events: none;
}

/* Ball */
#ball-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

#ball {
  border-radius: 50%;
  position: relative;
  transition: none; /* JS drives size */
  will-change: width, height;
  background: radial-gradient(circle at 35% 32%,
    rgba(200,225,255,0.92) 0%,
    rgba(133,193,233,0.78) 28%,
    rgba(31,97,141,0.68)   65%,
    rgba(13,33,55,0.82)    100%
  );
  box-shadow:
    inset 0 -8px 24px rgba(0,0,0,0.35),
    inset 0  4px 16px rgba(180,220,255,0.28),
    0 0 60px 12px rgba(133,193,233,0.18),
    0 0 120px 30px rgba(31,97,141,0.12);
}

/* Shimmer on ball */
#ball::before {
  content:'';
  position:absolute;
  top:12%; left:22%;
  width:30%; height:18%;
  border-radius:50%;
  background: rgba(255,255,255,0.22);
  filter: blur(4px);
  pointer-events:none;
}

/* Phase text */
#phase-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--pearl);
  text-shadow: 0 0 20px rgba(133,193,233,0.4);
  text-align: center;
  margin-top: 18px;
  min-height: 44px;
  transition: opacity 0.4s;
}

#count-display {
  font-family: 'Karla', sans-serif;
  font-size: clamp(38px, 7vw, 56px);
  font-weight: 300;
  color: var(--gold);
  letter-spacing: -1px;
  text-shadow: 0 0 24px rgba(126,184,212,0.5);
  line-height: 1;
  min-height: 64px;
  transition: opacity 0.2s;
}

/* Progress arc */
#arc-canvas {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

/* Controls panel */
.controls {
  flex-shrink: 0;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.ratio-section {
  background: rgba(13,33,55,0.5);
  border: 1px solid rgba(133,193,233,0.1);
  border-radius: 16px;
  padding: 16px 20px;
  backdrop-filter: blur(8px);
}

.ratio-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--textdim);
  margin-bottom: 12px;
  text-align: center;
}

.ratio-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.phase-ctrl {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.phase-name {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--textdim);
}
.phase-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--pearl);
  line-height: 1;
}
.phase-num.zero {
  color: rgba(133,193,233,0.25);
}
.stepper {
  display: flex;
  gap: 4px;
}
.step-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid rgba(133,193,233,0.25);
  background: transparent;
  color: var(--foam);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  line-height: 1;
  font-family: 'Karla', sans-serif;
}
.step-btn:hover { background: rgba(133,193,233,0.15); border-color: var(--foam); }
.step-btn:active { transform: scale(0.9); }

/* Bottom buttons row */
.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: center;
}

.main-btn {
  min-width: 130px;
  padding: 13px 28px;
  border-radius: 999px;
  border: 1px solid rgba(126,184,212,0.4);
  background: linear-gradient(135deg, rgba(126,184,212,0.15), rgba(126,184,212,0.05));
  color: var(--goldlt);
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-style: italic;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
}
.main-btn:hover {
  background: linear-gradient(135deg, rgba(126,184,212,0.28), rgba(126,184,212,0.12));
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(126,184,212,0.25);
}
.main-btn.running {
  border-color: rgba(133,193,233,0.4);
  background: linear-gradient(135deg, rgba(133,193,233,0.15), rgba(133,193,233,0.05));
  color: var(--foam);
}

.sound-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(133,193,233,0.2);
  background: transparent;
  color: var(--textdim);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.sound-btn:hover { border-color: var(--foam); color: var(--foam); background: rgba(133,193,233,0.08); }
.sound-btn.active { border-color: var(--foam); color: var(--pearl); background: rgba(133,193,233,0.12); }

/* Cycle counter */
.cycle-count {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--textdim);
  text-transform: uppercase;
}
.cycle-count span {
  color: var(--foam);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
}

/* Responsive */
@media (max-height: 700px) {
  .header h1 { font-size: 22px; }
  #phase-label { font-size: 18px; margin-top: 10px; }
  #count-display { font-size: 32px; }
  .ratio-section { padding: 10px 14px; }
}
@media (max-width: 380px) {
  .ratio-grid { gap: 6px; }
  .phase-num { font-size: 20px; }
}
</style>
</head>
<body>

<!-- Ocean background -->
<div id="ocean-bg">
  <div class="stars"></div>
  <div class="wave-layer wl1"></div>
  <div class="foam-line"></div>
  <div class="wave-layer wl2"></div>
  <div class="wave-layer wl3"></div>
</div>

<div id="app">

  <!-- Header -->
  <div class="header">
    <h1>Prana</h1>
    <p>Conscious Breathing</p>
  </div>

  <!-- Technique presets -->
  <div class="techniques" id="techniques">
    <button class="tech-btn active" data-tech="5-5"      onclick="applyTech(this)">5 : 5</button>
    <button class="tech-btn"        data-tech="4-7-8"    onclick="applyTech(this)">4 – 7 – 8</button>
    <button class="tech-btn"        data-tech="box"      onclick="applyTech(this)">Box 4:4:4:4</button>
    <button class="tech-btn"        data-tech="box-adv"  onclick="applyTech(this)">Box 5:5:5:5</button>
    <button class="tech-btn"        data-tech="coherent" onclick="applyTech(this)">Coherent 6:6</button>
    <button class="tech-btn"        data-tech="custom"   id="customBtn">Custom</button>
  </div>

  <!-- Stage -->
  <div class="stage" id="stage">
    <canvas id="arc-canvas"></canvas>
    <div id="ball-wrap">
      <div id="ball"></div>
    </div>
    <div id="count-display">—</div>
    <div id="phase-label">Press Begin</div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Ratio panel -->
    <div class="ratio-section">
      <div class="ratio-label">Breath Ratio (seconds)</div>
      <div class="ratio-grid">
        <div class="phase-ctrl">
          <div class="phase-name">Inhale</div>
          <div class="phase-num" id="val-inhale">5</div>
          <div class="stepper">
            <button class="step-btn" onclick="adjust('inhale',-1)">−</button>
            <button class="step-btn" onclick="adjust('inhale',+1)">+</button>
          </div>
        </div>
        <div class="phase-ctrl">
          <div class="phase-name">Hold In</div>
          <div class="phase-num zero" id="val-hold-in">0</div>
          <div class="stepper">
            <button class="step-btn" onclick="adjust('hold-in',-1)">−</button>
            <button class="step-btn" onclick="adjust('hold-in',+1)">+</button>
          </div>
        </div>
        <div class="phase-ctrl">
          <div class="phase-name">Exhale</div>
          <div class="phase-num" id="val-exhale">5</div>
          <div class="stepper">
            <button class="step-btn" onclick="adjust('exhale',-1)">−</button>
            <button class="step-btn" onclick="adjust('exhale',+1)">+</button>
          </div>
        </div>
        <div class="phase-ctrl">
          <div class="phase-name">Hold Out</div>
          <div class="phase-num zero" id="val-hold-out">0</div>
          <div class="stepper">
            <button class="step-btn" onclick="adjust('hold-out',-1)">−</button>
            <button class="step-btn" onclick="adjust('hold-out',+1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Cycle display + buttons -->
    <div class="cycle-count">
      Cycles completed: <span id="cycle-num">0</span>
    </div>

    <div class="btn-row">
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Toggle chimes">🔕</button>
      <button class="main-btn"  id="mainBtn"  onclick="toggleSession()">Begin</button>
      <button class="sound-btn" style="font-size:13px;letter-spacing:0" onclick="resetSession()" title="Reset">↺</button>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  running: false,
  phase: 'idle',      // inhale | hold-in | exhale | hold-out | idle
  phaseIdx: 0,
  elapsed: 0,         // ms since phase start
  cycles: 0,
  audioCtx: null,
  oceanNodes: null,
  soundOn: false,
  animId: null,
  lastTs: null,
  ratio: { inhale: 5, 'hold-in': 0, exhale: 5, 'hold-out': 0 },
};

const PHASES = ['inhale','hold-in','exhale','hold-out'];
const PHASE_LABELS = {
  'inhale':   'Inhale…',
  'hold-in':  'Hold',
  'exhale':   'Exhale…',
  'hold-out': 'Hold',
};
const PHASE_COLORS = {
  'inhale':   { r:133, g:193, b:233 },
  'hold-in':  { r:180, g:215, b:245 },
  'exhale':   { r:133, g:193, b:170 },
  'hold-out': { r:160, g:200, b:230 },
};

// Ball size bounds (px)
let BALL_MIN, BALL_MAX, ARC_R;

function calcSizes() {
  const stage = document.getElementById('stage');
  const sw = stage.clientWidth;
  const sh = stage.clientHeight;
  const avail = Math.min(sw * 0.72, sh * 0.5, 240);
  BALL_MIN = Math.max(avail * 0.38, 60);
  BALL_MAX = avail;
  ARC_R    = BALL_MAX * 0.68 + 28;
}

// ═══════════════════════════════════════════════════════════════
// TECHNIQUES
// ═══════════════════════════════════════════════════════════════
const TECHNIQUES = {
  '5-5':      { inhale:5, 'hold-in':0, exhale:5, 'hold-out':0 },
  '4-7-8':    { inhale:4, 'hold-in':7, exhale:8, 'hold-out':0 },
  'box':      { inhale:4, 'hold-in':4, exhale:4, 'hold-out':4 },
  'box-adv':  { inhale:5, 'hold-in':5, exhale:5, 'hold-out':5 },
  'coherent': { inhale:6, 'hold-in':0, exhale:6, 'hold-out':0 },
};

function applyTech(btn) {
  const tech = btn.dataset.tech;
  if (!TECHNIQUES[tech]) return;
  document.querySelectorAll('.tech-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const t = TECHNIQUES[tech];
  state.ratio = { ...t };
  updateRatioUI();
  if (state.running) restartSession();
}

function updateRatioUI() {
  for (const k of PHASES) {
    const el = document.getElementById('val-' + k);
    const v  = state.ratio[k];
    el.textContent = v;
    el.classList.toggle('zero', v === 0);
  }
}

function adjust(phase, delta) {
  const v = Math.max(0, Math.min(30, (state.ratio[phase] || 0) + delta));
  // Inhale and exhale must be at least 1
  if ((phase === 'inhale' || phase === 'exhale') && v < 1) return;
  state.ratio[phase] = v;
  updateRatioUI();
  // Mark custom
  document.querySelectorAll('.tech-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('customBtn').classList.add('active');
  if (state.running) restartSession();
}

// ═══════════════════════════════════════════════════════════════
// SESSION CONTROL
// ═══════════════════════════════════════════════════════════════
function toggleSession() {
  if (state.running) stopSession();
  else startSession();
}

function startSession() {
  calcSizes();
  state.running  = true;
  state.phaseIdx = 0;
  state.elapsed  = 0;
  state.cycles   = 0;
  state.lastTs   = null;
  document.getElementById('cycle-num').textContent = '0';
  document.getElementById('mainBtn').textContent = 'Pause';
  document.getElementById('mainBtn').classList.add('running');
  enterPhase(0);
  state.animId = requestAnimationFrame(tick);
}

function stopSession() {
  state.running = false;
  if (state.animId) cancelAnimationFrame(state.animId);
  document.getElementById('mainBtn').textContent = 'Resume';
  document.getElementById('mainBtn').classList.remove('running');
  document.getElementById('phase-label').textContent = 'Paused';
}

function resetSession() {
  stopSession();
  state.cycles = 0;
  state.phase = 'idle';
  document.getElementById('cycle-num').textContent = '0';
  document.getElementById('mainBtn').textContent = 'Begin';
  document.getElementById('mainBtn').classList.remove('running');
  document.getElementById('phase-label').textContent = 'Press Begin';
  document.getElementById('count-display').textContent = '—';
  setBallSize(BALL_MIN || 80);
  drawArc(0, 'inhale');
}

function restartSession() {
  if (state.animId) cancelAnimationFrame(state.animId);
  state.phaseIdx = 0;
  state.elapsed  = 0;
  state.lastTs   = null;
  enterPhase(0);
  state.animId = requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
function tick(ts) {
  if (!state.running) return;
  if (state.lastTs === null) state.lastTs = ts;
  const dt = ts - state.lastTs;
  state.lastTs = ts;

  state.elapsed += dt;

  const phase    = PHASES[state.phaseIdx];
  const dur      = state.ratio[phase] * 1000;

  // Skip zero-duration phases
  if (dur === 0) {
    advancePhase();
    state.animId = requestAnimationFrame(tick);
    return;
  }

  const progress = Math.min(state.elapsed / dur, 1);
  const secsLeft = Math.max(0, Math.ceil((dur - state.elapsed) / 1000));

  // Update counter
  document.getElementById('count-display').textContent = secsLeft === 0 ? '' : secsLeft;

  // Update ball + arc
  updateBall(phase, progress);
  drawArc(progress, phase);

  if (progress >= 1) {
    advancePhase();
  }

  state.animId = requestAnimationFrame(tick);
}

function advancePhase() {
  state.elapsed = 0;
  state.phaseIdx++;

  // Check cycle complete
  if (state.phaseIdx >= PHASES.length) {
    state.phaseIdx = 0;
    state.cycles++;
    document.getElementById('cycle-num').textContent = state.cycles;
  }

  enterPhase(state.phaseIdx);
}

function enterPhase(idx) {
  // Find next non-zero phase
  let attempts = 0;
  while (state.ratio[PHASES[idx]] === 0 && attempts < PHASES.length) {
    idx = (idx + 1) % PHASES.length;
    attempts++;
    if (idx === 0) { state.cycles++; document.getElementById('cycle-num').textContent = state.cycles; }
  }
  state.phaseIdx = idx;
  state.phase    = PHASES[idx];
  document.getElementById('phase-label').textContent = PHASE_LABELS[state.phase];
}

// ═══════════════════════════════════════════════════════════════
// BALL PHYSICS
// ═══════════════════════════════════════════════════════════════
function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

function updateBall(phase, t) {
  if (!BALL_MIN) calcSizes();
  const eased = easeInOutSine(t);
  let size;
  if (phase === 'inhale') {
    size = BALL_MIN + (BALL_MAX - BALL_MIN) * eased;
  } else if (phase === 'hold-in') {
    size = BALL_MAX;
  } else if (phase === 'exhale') {
    size = BALL_MAX - (BALL_MAX - BALL_MIN) * eased;
  } else if (phase === 'hold-out') {
    size = BALL_MIN;
  }
  setBallSize(size);
}

function setBallSize(size) {
  if (!size) return;
  const ball = document.getElementById('ball');
  ball.style.width  = size + 'px';
  ball.style.height = size + 'px';
  // Pulse glow intensity with size
  const glow = (size - (BALL_MIN||60)) / ((BALL_MAX||200) - (BALL_MIN||60));
  const g1 = Math.round(60 + glow * 60);
  const g2 = Math.round(12 + glow * 20);
  const g3 = Math.round(120 + glow * 60);
  const g4 = Math.round(30 + glow * 40);
  ball.style.boxShadow = `
    inset 0 -8px 24px rgba(0,0,0,0.35),
    inset 0  4px 16px rgba(180,220,255,${0.18 + glow * 0.22}),
    0 0 ${g1}px ${g2}px rgba(133,193,233,${0.15 + glow * 0.2}),
    0 0 ${g3}px ${g4}px rgba(31,97,141,${0.1 + glow * 0.12})
  `;
}

// ═══════════════════════════════════════════════════════════════
// ARC CANVAS
// ═══════════════════════════════════════════════════════════════
function drawArc(progress, phase) {
  const canvas = document.getElementById('arc-canvas');
  if (!BALL_MAX) calcSizes();
  const size = (ARC_R + 24) * 2;
  canvas.width  = size;
  canvas.height = size;
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);

  const cx = size / 2, cy = size / 2;
  const r  = ARC_R;

  // Background track
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(133,193,233,0.08)';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Progress arc
  const col = PHASE_COLORS[phase] || { r:133, g:193, b:233 };
  const startAngle = -Math.PI / 2;
  const endAngle   = startAngle + Math.PI * 2 * progress;

  const grad = ctx.createLinearGradient(cx-r, cy, cx+r, cy);
  grad.addColorStop(0, `rgba(${col.r},${col.g},${col.b},0.8)`);
  grad.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0.3)`);

  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Dot at progress tip
  if (progress > 0 && progress < 1) {
    const dotX = cx + r * Math.cos(endAngle);
    const dotY = cy + r * Math.sin(endAngle);
    ctx.beginPath();
    ctx.arc(dotX, dotY, 4.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},1)`;
    ctx.fill();
    // glow
    ctx.beginPath();
    ctx.arc(dotX, dotY, 9, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},0.2)`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
// CHIMES AUDIO  (Web Audio API — procedural, no network needed)
// ═══════════════════════════════════════════════════════════════

// Pentatonic scale frequencies (Hz) — C5, D5, E5, G5, A5, C6, D6, E6
const CHIME_FREQS = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51];

// Soft ambient pad frequencies for background shimmer
const PAD_FREQS = [261.63, 329.63, 392.00, 523.25]; // C4 maj chord

let chimeScheduler = null;

function buildChimeAudio(ctx) {
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.0;

  // Soft reverb via convolver (impulse response generated procedurally)
  const convolver = ctx.createConvolver();
  const irLen  = ctx.sampleRate * 3.2;
  const irBuf  = ctx.createBuffer(2, irLen, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.4);
    }
  }
  convolver.buffer = irBuf;

  // Wet/dry mix
  const dryGain = ctx.createGain(); dryGain.gain.value = 0.45;
  const wetGain = ctx.createGain(); wetGain.gain.value = 0.55;

  convolver.connect(wetGain);
  wetGain.connect(masterGain);
  dryGain.connect(masterGain);
  masterGain.connect(ctx.destination);

  // ── Ambient pad: gentle sustained tones ──────────────────────
  PAD_FREQS.forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    // Slight detune for warmth
    osc.detune.value = (i % 2 === 0 ? 3 : -3);
    gain.gain.value = 0.018;
    // Slow tremolo
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.08 + i * 0.015;
    const lfoG = ctx.createGain(); lfoG.gain.value = 0.006;
    lfo.connect(lfoG); lfoG.connect(gain.gain);
    lfo.start(); osc.start();
    osc.connect(gain);
    gain.connect(dryGain);
    gain.connect(convolver);
  });

  // ── Chime strike function ─────────────────────────────────────
  function strikeChime(freq, when, vol = 0.18) {
    // Fundamental
    const osc1  = ctx.createOscillator();
    const osc2  = ctx.createOscillator(); // 2nd partial (slight inharmonic)
    const osc3  = ctx.createOscillator(); // high shimmer partial
    const eGain = ctx.createGain();

    osc1.type = 'sine'; osc1.frequency.value = freq;
    osc2.type = 'sine'; osc2.frequency.value = freq * 2.756; // inharmonic
    osc3.type = 'sine'; osc3.frequency.value = freq * 5.404; // bell partial

    // ADSR envelope — instant attack, long gentle decay
    eGain.gain.setValueAtTime(0, when);
    eGain.gain.linearRampToValueAtTime(vol, when + 0.008);
    eGain.gain.exponentialRampToValueAtTime(vol * 0.35, when + 0.25);
    eGain.gain.exponentialRampToValueAtTime(vol * 0.08, when + 1.4);
    eGain.gain.exponentialRampToValueAtTime(0.0001,     when + 4.5);

    const g2 = ctx.createGain(); g2.gain.value = 0.28; // partial balance
    const g3 = ctx.createGain(); g3.gain.value = 0.12;

    osc1.connect(eGain);
    osc2.connect(g2); g2.connect(eGain);
    osc3.connect(g3); g3.connect(eGain);

    eGain.connect(dryGain);
    eGain.connect(convolver);

    osc1.start(when); osc1.stop(when + 5);
    osc2.start(when); osc2.stop(when + 5);
    osc3.start(when); osc3.stop(when + 5);
  }

  // ── Scheduler: random chimes on a gentle pentatonic pattern ──
  let nextChimeTime = ctx.currentTime + 0.5;

  function scheduleChimes() {
    if (!state.soundOn) return;

    const now = ctx.currentTime;
    // Schedule ~1.2 s ahead to avoid gaps
    while (nextChimeTime < now + 1.2) {
      // Pick a random note from pentatonic scale
      const freq = CHIME_FREQS[Math.floor(Math.random() * CHIME_FREQS.length)];
      // Occasional soft double-strike for interest
      const vol  = 0.12 + Math.random() * 0.10;
      strikeChime(freq, nextChimeTime, vol);

      // Sometimes add a soft harmony a 5th above
      if (Math.random() < 0.3) {
        const harmFreq = CHIME_FREQS[Math.min(CHIME_FREQS.length - 1,
          CHIME_FREQS.indexOf(freq) + 2)];
        strikeChime(harmFreq, nextChimeTime + 0.06, vol * 0.55);
      }

      // Gap between strikes: 1.8 – 5.5 s, longer gaps feel more meditative
      nextChimeTime += 1.8 + Math.random() * 3.7;
    }

    chimeScheduler = setTimeout(scheduleChimes, 600);
  }

  scheduleChimes();

  // Gentle fade-in
  masterGain.gain.setTargetAtTime(0.72, ctx.currentTime, 1.4);

  return { masterGain, scheduleChimes };
}

function stopChimes() {
  if (chimeScheduler) { clearTimeout(chimeScheduler); chimeScheduler = null; }
}

function toggleSound() {
  const btn = document.getElementById('soundBtn');
  if (!state.soundOn) {
    if (!state.audioCtx) {
      state.audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      state.oceanNodes = buildChimeAudio(state.audioCtx);
    } else if (state.audioCtx.state === 'suspended') {
      state.audioCtx.resume();
      // Restart scheduler
      if (state.oceanNodes) state.oceanNodes.scheduleChimes();
    }
    state.soundOn = true;
    btn.textContent = '🔔';
    btn.classList.add('active');
  } else {
    stopChimes();
    if (state.oceanNodes) {
      state.oceanNodes.masterGain.gain.setTargetAtTime(0, state.audioCtx.currentTime, 0.8);
    }
    state.soundOn = false;
    btn.textContent = '🔕';
    btn.classList.remove('active');
    setTimeout(() => {
      if (!state.soundOn && state.audioCtx) state.audioCtx.suspend();
    }, 1400);
  }
}

// ═══════════════════════════════════════════════════════════════
// RESIZE HANDLING
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  calcSizes();
  if (!state.running) {
    setBallSize(BALL_MIN);
    drawArc(0, 'inhale');
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  calcSizes();
  setBallSize(BALL_MIN);
  drawArc(0, 'inhale');
  updateRatioUI();
});
</script>
